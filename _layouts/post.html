---
layout: default
---

<header>
    <div class="container">
        <nav>
            <a href="{{ '/' | relative_url }}">← Back to Blog List</a>
        </nav>
    </div>
</header>

<main class="container">
    <article class="post">
        <header class="post-header">
            <h1>{{ page.title }}</h1>
            <div class="post-meta">
                <time datetime="{{ page.date | date_to_xmlschema }}">
                    {{ page.date | date: "%B %d, %Y" }}
                </time>
                {% if page.tags %}
                    <div class="tags">
                        {% for tag in page.tags %}
                            <span class="tag">{{ tag }}</span>
                        {% endfor %}
                    </div>
                {% endif %}
            </div>
        </header>
        
        <div class="post-content">
            {{ content }}
        </div>
    </article>
</main>

<footer>
    <div class="container">
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
        <p><a href="https://manask322.github.io">← Back to Main Website</a></p>
    </div>
</footer>
